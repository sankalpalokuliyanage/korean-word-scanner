<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Korean Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .container { max-width: 650px; margin-top: 20px; }
        .upload-card { border: 2px dashed #007bff; border-radius: 15px; background: white; transition: 0.3s; }
        #imagePreview { width: 100%; border-radius: 10px; display: none; margin-bottom: 20px; border: 1px solid #ddd; }
        .word-row { background: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #007bff; }
        .loading-spinner { display: none; }
        canvas { display: none; } /* Pre-processing සඳහා රහසිගතව භාවිතා වේ */
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">🇰🇷 SNU Smart Scanner v2</h2>
        <p class="text-muted">High-Accuracy OCR Technology පාවිච්චි කර ඇත</p>
    </div>

    <div class="card upload-card p-4 mb-4 text-center">
        <input type="file" id="fileInput" accept="image/*" capture="environment" class="form-control mb-2">
        <small class="text-secondary font-monospace">Hint: Use good lighting and keep the camera steady.</small>
    </div>

    <canvas id="preprocessCanvas"></canvas>
    <img id="imagePreview" alt="Original Preview">

    <div id="loading" class="loading-spinner text-center">
        <div class="spinner-grow text-primary" role="status"></div>
        <p class="mt-2 fw-bold">Analyzing Layout & Extracting Text...</p>
    </div>

    <div id="editArea" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0">වචන ලැයිස්තුව:</h5>
            <span class="badge bg-primary" id="wordCount">0 words found</span>
        </div>
        <div id="wordContainer"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1I8cBQcJwrLqVgbfLvTqbDGciOle98avxX-j2G_XUMFLr48afMjhz0PSF9N2obMAhdg/exec'; 
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const loading = document.getElementById('loading');
    const editArea = document.getElementById('editArea');
    const wordContainer = document.getElementById('wordContainer');
    const canvas = document.getElementById('preprocessCanvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Show preview
        imagePreview.src = URL.createObjectURL(file);
        imagePreview.style.display = 'block';
        loading.style.display = 'block';
        editArea.style.display = 'none';
        wordContainer.innerHTML = '';

        // Step 1: Pre-process Image for Better Accuracy
        const processedImage = await preprocessImage(file);

        // Step 2: Run OCR with Advanced Config
        try {
            const worker = await Tesseract.createWorker('kor+eng');
            
            // Layout analysis mode එක වෙනස් කරමු (Single column logic)
            await worker.setParameters({
                tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT, 
                tessjs_create_hocr: '0',
                tessjs_create_tsv: '0'
            });

            const result = await worker.recognize(processedImage);
            const lines = result.data.lines;

            let count = 0;
            lines.forEach(line => {
                const text = line.text.trim();
                // SNU පොතේ වචනයක් සාමාන්‍යයෙන් අකුරු 2කට වඩා වැඩියි
                if (text.length < 2) return; 

                // Regex - Korean / English / Page Number වෙන් කිරීම
                const kor = text.match(/[가-힣]{1,}/g);
                const eng = text.match(/[a-zA-Z]{2,}[\s[a-zA-Z]*/g);
                const page = text.match(/\d{2,3}$/);

                if (kor) {
                    count++;
                    createRow(
                        kor.join(' '), 
                        eng ? eng[0].trim() : '', 
                        page ? page[0] : ''
                    );
                }
            });

            document.getElementById('wordCount').innerText = `${count} words found`;
            await worker.terminate();
            loading.style.display = 'none';
            editArea.style.display = 'block';
        } catch (err) {
            console.error(err);
            alert("OCR Error! Please try again.");
            loading.style.display = 'none';
        }
    });

    // Image එකේ Contrast සහ Brightness හදන Logic එක
    async function preprocessImage(file) {
        return new Promise((resolve) => {
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                
                // Grayscale and Contrast filter
                ctx.filter = 'grayscale(1) contrast(1.5) brightness(1.2)';
                ctx.drawImage(img, 0, 0);
                
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
        });
    }

    function createRow(kor, eng, page) {
        const div = document.createElement('div');
        div.className = 'word-row';
        div.innerHTML = `
            <div class="row g-2 align-items-center">
                <div class="col-5">
                    <input type="text" class="form-control form-control-sm korean-val" value="${kor}">
                </div>
                <div class="col-5">
                    <input type="text" class="form-control form-control-sm english-val" value="${eng}">
                </div>
                <div class="col-2 p-0 text-center">
                    <button class="btn btn-sm btn-primary w-75" onclick="sendRow(this, '${page}')">Add</button>
                </div>
            </div>
        `;
        wordContainer.appendChild(div);
    }

    async function sendRow(btn, pageNo) {
        const row = btn.closest('.word-row');
        const korean = row.querySelector('.korean-val').value;
        const english = row.querySelector('.english-val').value;

        if(!korean || !english) return alert("Fields cannot be empty!");

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

        const params = new URLSearchParams();
        params.append('korean', korean);
        params.append('english', english);
        params.append('page', pageNo);

        try {
            // Google Script එකට data යවන විට CORS issues මඟ හැරීමට no-cors භාවිතා වේ
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: params,
                mode: 'no-cors'
            });
            
            row.style.background = "#d4edda";
            row.style.borderLeft = "5px solid #28a745";
            btn.innerHTML = "✓";
            btn.className = "btn btn-sm btn-outline-secondary w-75";
        } catch (err) {
            btn.disabled = false;
            btn.innerText = "Retry";
            alert("Upload failed!");
        }
    }
</script>

</body>
</html>
