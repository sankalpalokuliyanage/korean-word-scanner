<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Word Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .glass-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: auto; max-width: 500px; }
        .hidden { display: none; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .word-list-container { margin-top: 30px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .word-item { background: white; padding: 12px 18px; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<div id="loginSection" class="glass-card mt-5">
    <h3 class="fw-bold text-center mb-4">🇰🇷 Start Session</h3>
    <input type="text" id="userName" class="form-control mb-3 p-3 rounded-4" placeholder="Your Name">
    <select id="userLevel" class="form-select mb-4 p-3 rounded-4">
        <option value="" disabled selected>Select Level</option>
        <option value="Level 1">Level 1</option><option value="Level 2">Level 2</option>
        <option value="Level 3">Level 3</option><option value="Level 4">Level 4</option>
        <option value="Level 5">Level 5</option><option value="Level 6">Level 6</option>
    </select>
    <button class="btn-main" onclick="start()">Get Started</button>
</div>

<div id="entrySection" class="hidden">
    <div class="glass-card">
        <div class="d-flex justify-content-between mb-3 small text-muted">
            <span>User: <b id="uName"></b></span>
            <span>Level: <b id="uLevel"></b></span>
        </div>
        <input type="text" id="korInput" class="form-control mb-3 p-3 rounded-3" placeholder="Korean Word (හන්ගුල්)">
        <input type="text" id="engInput" class="form-control mb-4 p-3 rounded-3" placeholder="English Meaning (තේරුම)">
        <button id="addBtn" class="btn-main" onclick="save()">Save & Add</button>
    </div>

    <div class="word-list-container">
        <h6 class="text-secondary mb-3">Your Words</h6>
        <div id="myWords"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhy5h67ZSkM6eogU5myS7gro-KB89oN2hbP187twjqjs_isb-a1bapYyy5DyTkTNldFg/exec';
    let user = "", level = "";

    function start() {
        user = document.getElementById('userName').value;
        level = document.getElementById('userLevel').value;
        if(!user || !level) return alert("Enter your Name and Level");
        document.getElementById('uName').innerText = user;
        document.getElementById('uLevel').innerText = level;
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('entrySection').classList.remove('hidden');
    }

    async function save() {
        const kor = document.getElementById('korInput').value;
        const eng = document.getElementById('engInput').value;
        if(!kor || !eng) return;

        const btn = document.getElementById('addBtn');
        btn.disabled = true;

        // UI එකට වහාම එකතු කිරීම
        addToList(kor, eng);

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: new URLSearchParams({user, level, korean: kor, english: eng}),
                mode: 'no-cors' 
            });
            document.getElementById('korInput').value = "";
            document.getElementById('engInput').value = "";
            document.getElementById('korInput').focus();
        } catch (e) { alert("Error saving!"); }
        btn.disabled = false;
    }

    function addToList(k, e) {
        const div = document.createElement('div');
        div.className = 'word-item animate__animated animate__fadeIn';
        div.innerHTML = `<div><b>${k}</b><br><small class="text-muted">${e}</small></div> <span class="badge bg-light text-dark">Added</span>`;
        const list = document.getElementById('myWords');
        list.insertBefore(div, list.firstChild);
    }
</script>
</body>
</html>
