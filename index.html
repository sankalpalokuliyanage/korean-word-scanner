<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Korean Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; overflow-x: hidden; }
        .video-container { position: relative; width: 100%; max-width: 500px; margin: auto; overflow: hidden; border-radius: 15px; border: 2px solid #333; }
        #video { width: 100%; height: auto; display: block; }
        .scan-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60px; border: 2px solid #00ff00; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); pointer-events: none;
        }
        .results-panel { background: #222; padding: 20px; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; z-index: 10; min-height: 300px; }
        .word-card { background: #333; border-radius: 10px; padding: 10px; margin-bottom: 10px; border-left: 4px solid #00ff00; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; width: 90%; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-overlay"></div>
    <div id="scanStatus" class="position-absolute top-0 start-50 translate-middle-x mt-2 badge bg-danger">LIVE</div>
</div>

<canvas id="captureCanvas" style="display:none;"></canvas>

<div class="results-panel">
    <h6 class="text-secondary text-center mb-3">හඳුනාගත් වචන (සංස්කරණය කර එකතු කරන්න)</h6>
    <div id="wordList"></div>
</div>

<div class="controls">
    <button id="startBtn" class="btn btn-success w-100 py-3 fw-bold shadow">Start Live Scan</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1I8cBQcJwrLqVgbfLvTqbDGciOle98avxX-j2G_XUMFLr48afMjhz0PSF9N2obMAhdg/exec';
    const video = document.getElementById('video');
    const canvas = document.getElementById('captureCanvas');
    const wordList = document.getElementById('wordList');
    const startBtn = document.getElementById('startBtn');
    let isScanning = false;
    let worker = null;

    // කැමරාව පණගැන්වීම
    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
    }

    // OCR Worker සූදානම් කිරීම
    async function initOCR() {
        worker = await Tesseract.createWorker('kor+eng');
        await worker.setParameters({
            tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE, // එක පේළියක් පමණක් කියවීමට
        });
    }

    startBtn.addEventListener('click', async () => {
        if (!isScanning) {
            startBtn.innerText = "Scanning... (Stop)";
            startBtn.classList.replace('btn-success', 'btn-danger');
            isScanning = true;
            if (!worker) await initOCR();
            scanFrame();
        } else {
            location.reload(); // Stop කිරීමට ලේසිම ක්‍රමය refresh කිරීමයි
        }
    });

    async function scanFrame() {
        if (!isScanning) return;

        // Video එකෙන් frame එකක් capture කිරීම (Overlay එකේ තියෙන කොටස පමණක්)
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Scan කිරීම
        const { data: { text } } = await worker.recognize(canvas);
        processText(text);

        // ඊළඟ frame එක තත්පර 1කට පස්සේ scan කරන්න (Battery & CPU ඉතිරි කිරීමට)
        setTimeout(scanFrame, 1000);
    }

    function processText(text) {
        const cleanText = text.trim();
        if (cleanText.length < 2) return;

        // දැනටමත් මේ වචනය list එකේ තියෙනවදැයි බලන්න
        if ([...document.querySelectorAll('.korean-val')].some(input => input.value === cleanText)) return;

        const kor = cleanText.match(/[가-힣]+/g);
        const eng = cleanText.match(/[a-zA-Z\s]+/g);

        if (kor) {
            addWordToUI(kor.join(' '), eng ? eng.join(' ').trim() : '');
        }
    }

    function addWordToUI(kor, eng) {
        const div = document.createElement('div');
        div.className = 'word-card animate__animated animate__fadeInUp';
        div.innerHTML = `
            <div class="row g-2">
                <div class="col-5"><input type="text" class="form-control form-control-sm korean-val" value="${kor}"></div>
                <div class="col-5"><input type="text" class="form-control form-control-sm english-val" value="${eng}"></div>
                <div class="col-2"><button class="btn btn-sm btn-primary w-100" onclick="sendToSheet(this)">Add</button></div>
            </div>
        `;
        wordList.prepend(div); // අලුත් වචන උඩටම එන ලෙස
    }

    async function sendToSheet(btn) {
        const card = btn.closest('.word-card');
        const korean = card.querySelector('.korean-val').value;
        const english = card.querySelector('.english-val').value;

        btn.disabled = true;
        btn.innerHTML = '...';

        const params = new URLSearchParams({ korean, english, page: 'Live' });
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
            card.style.borderColor = '#28a745';
            btn.innerHTML = '✓';
            btn.className = 'btn btn-sm btn-secondary w-100';
        } catch (e) {
            btn.disabled = false;
            btn.innerHTML = 'Add';
        }
    }

    setupCamera();
</script>

</body>
</html>
