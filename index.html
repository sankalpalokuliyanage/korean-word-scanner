<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Korean Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .scanner-header { padding: 12px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 14px; }
        
        /* Camera Viewport */
        .viewport-container { position: relative; width: 100%; height: 40vh; background: #000; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Focus Box */
        .focus-box {
            position: absolute; width: 75%; height: 50px; border: 2px solid #00d2ff; border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); /* Dim background outside box */
            pointer-events: none; transition: 0.3s;
        }
        .focus-box::after {
            content: 'SCAN AREA'; position: absolute; top: -22px; left: 5px;
            font-size: 10px; color: #00d2ff; font-weight: bold; letter-spacing: 1px;
        }

        /* Controls */
        .control-panel { padding: 20px; background: #1a1a1a; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; height: 60vh; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .input-group-custom { background: #252525; padding: 12px 15px; border-radius: 15px; margin-bottom: 15px; border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .active-scan { border-color: #00d2ff !important; background: #1e2a3a !important; }
        .active-scan.eng-mode { border-color: #ffc107 !important; background: #2a2518 !important; }
        
        .btn-submit { background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; color: white; padding: 14px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-submit:disabled { background: #444; opacity: 0.7; }
        
        #status { font-size: 12px; color: #888; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="scanner-header text-center fw-bold">
    PRECISION VOCAB COLLECTOR
</div>

<div class="viewport-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="focus-box" id="focusBox"></div>
    <canvas id="captureCanvas"></canvas>
</div>

<div class="control-panel">
    <div class="text-center mb-3">
        <span class="badge rounded-pill bg-dark border border-secondary px-3 py-2" id="modeBadge">MODE: KOREAN</span>
    </div>

    <div class="input-group-custom active-scan" id="korGroup" onclick="setMode('kor')">
        <label class="small text-info fw-bold">Korean Word</label>
        <input type="text" id="korInput" class="form-control bg-transparent border-0 text-white p-0 fw-bold fs-5" placeholder="Scanning..." readonly>
    </div>

    <div class="input-group-custom" id="engGroup" onclick="setMode('eng')">
        <label class="small text-warning fw-bold">English Meaning</label>
        <input type="text" id="engInput" class="form-control bg-transparent border-0 text-white p-0 fw-bold fs-5" placeholder="Tap to scan meaning" readonly>
    </div>

    <div class="d-grid gap-2 mt-4">
        <button id="addBtn" class="btn btn-submit rounded-pill shadow" onclick="uploadData()">ADD TO DATASET</button>
        <button class="btn btn-link btn-sm text-secondary text-decoration-none" onclick="clearFields()">Clear & Reset</button>
    </div>

    <div id="status" class="text-center mt-3">Initializing AI & Camera...</div>
</div>

<script>
    // 1. ඔයාගේ Apps Script URL එක මෙතනට දාන්න
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1I8cBQcJwrLqVgbfLvTqbDGciOle98avxX-j2G_XUMFLr48afMjhz0PSF9N2obMAhdg/exec';
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('captureCanvas');
    const korInput = document.getElementById('korInput');
    const engInput = document.getElementById('engInput');
    const status = document.getElementById('status');
    const focusBox = document.getElementById('focusBox');
    const modeBadge = document.getElementById('modeBadge');

    let currentMode = 'kor'; 
    let worker = null;
    let isProcessing = false;

    // 2. කැමරාව සහ Tesseract පණගැන්වීම
    async function init() {
        try {
            status.innerText = "Accessing Camera...";
            const constraints = {
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                audio: false
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;

            status.innerText = "Loading Korean AI Model...";
            worker = await Tesseract.createWorker('kor+eng');
            await worker.setParameters({
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
            });
            
            status.innerText = "Scanner Ready";
            scanLoop();
        } catch (err) {
            console.error(err);
            status.innerText = "Error: " + err.message;
            alert("කැමරාවට අවසර ලබා දිය යුතුය. කරුණාකර settings පරීක්ෂා කරන්න.");
        }
    }

    // 3. Scan කරන Mode එක මාරු කිරීම
    function setMode(mode) {
        currentMode = mode;
        const isKor = mode === 'kor';
        
        document.getElementById('korGroup').classList.toggle('active-scan', isKor);
        document.getElementById('engGroup').classList.toggle('active-scan', !isKor);
        document.getElementById('engGroup').classList.toggle('eng-mode', !isKor);
        
        modeBadge.innerText = `MODE: ${mode.toUpperCase()}`;
        modeBadge.className = isKor ? 'badge rounded-pill bg-info text-dark px-3 py-2' : 'badge rounded-pill bg-warning text-dark px-3 py-2';
        focusBox.style.borderColor = isKor ? '#00d2ff' : '#ffc107';
    }

    // 4. Real-time Scan Loop
    async function scanLoop() {
        if (!isProcessing && worker) {
            isProcessing = true;
            
            // Focus box එක ඇතුළේ තියෙන රූපය විතරක් Capture කිරීම
            const ctx = canvas.getContext('2d');
            const box = focusBox.getBoundingClientRect();
            const videoBox = video.getBoundingClientRect();

            // Video එකේ scale එකට අනුව කපා ගැනීම
            const scaleX = video.videoWidth / videoBox.width;
            const scaleY = video.videoHeight / videoBox.height;

            const sx = (box.left - videoBox.left) * scaleX;
            const sy = (box.top - videoBox.top) * scaleY;
            const sw = box.width * scaleX;
            const sh = box.height * scaleY;

            canvas.width = sw;
            canvas.height = sh;
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

            try {
                const { data: { text } } = await worker.recognize(canvas);
                const cleaned = text.trim().replace(/\n/g, "");

                if (cleaned.length >= 1) {
                    if (currentMode === 'kor') {
                        // කොරියන් අකුරු තියෙනවා නම් විතරක් ගන්න
                        if (/[가-힣]/.test(cleaned)) korInput.value = cleaned;
                    } else {
                        // ඉංග්‍රීසි අකුරු තියෙනවා නම් විතරක් ගන්න
                        if (/[a-zA-Z]/.test(cleaned)) engInput.value = cleaned;
                    }
                }
            } catch (e) {}
            isProcessing = false;
        }
        setTimeout(scanLoop, 600); 
    }

    // 5. Google Sheet එකට Data යැවීම
    async function uploadData() {
        if (!korInput.value || !engInput.value) {
            alert("වචනය සහ තේරුම දෙකම තිබිය යුතුය.");
            return;
        }

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "UPLOADING...";

        const params = new URLSearchParams({
            korean: korInput.value,
            english: engInput.value,
            page: 'Precision-Live'
        });

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
            status.innerText = "Saved Successfully! ✓";
            
            // සාර්ථක නම් Fields හිස් කර නැවත කොරියන් මෝඩ් එකට යන්න
            setTimeout(() => {
                clearFields();
                setMode('kor');
                status.innerText = "Scanner Ready";
            }, 1000);

        } catch (e) {
            alert("Upload Failed!");
        } finally {
            btn.disabled = false;
            btn.innerText = "ADD TO DATASET";
        }
    }

    function clearFields() {
        korInput.value = '';
        engInput.value = '';
    }

    // Start Everything
    init();
</script>
</body>
</html>
