<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Korean Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        :root { --primary-color: #4a90e2; }
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .scanner-container { max-width: 600px; margin: auto; padding: 20px; }
        .preview-wrapper { position: relative; display: none; margin-bottom: 20px; border: 2px solid var(--primary-color); border-radius: 10px; overflow: hidden; }
        #imagePreview { width: 100%; display: block; }
        .crop-guide { position: absolute; border: 2px dashed red; pointer-events: none; display: none; }
        .word-row { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-add { background-color: var(--primary-color); border: none; color: white; }
    </style>
</head>
<body>

<div class="scanner-container">
    <div class="text-center mb-4">
        <h2 class="fw-bold">🇰🇷 Accuracy Booster Scan</h2>
        <p class="text-secondary">මුළු පිටුවම එකපාර scan නොකර column එකක් බැගින් කරන්න</p>
    </div>

    <div class="card p-4 border-0 shadow-sm mb-4">
        <input type="file" id="fileInput" accept="image/*" capture="environment" class="form-control">
        <p class="small text-center mt-2 text-danger">පොතේ එක තීරුවක් (Column) පේන ලෙස photo ගන්න.</p>
    </div>

    <div id="loading" class="text-center mb-3" style="display:none;">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 fw-bold">Deep Scanning...</p>
    </div>

    <div class="preview-wrapper" id="previewWrapper">
        <img id="imagePreview" src="">
    </div>

    <div id="editArea" style="display:none;">
        <div id="wordContainer"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1I8cBQcJwrLqVgbfLvTqbDGciOle98avxX-j2G_XUMFLr48afMjhz0PSF9N2obMAhdg/exec';
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewWrapper = document.getElementById('previewWrapper');
    const loading = document.getElementById('loading');
    const wordContainer = document.getElementById('wordContainer');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        imagePreview.src = URL.createObjectURL(file);
        previewWrapper.style.display = 'block';
        loading.style.display = 'block';
        wordContainer.innerHTML = '';
        document.getElementById('editArea').style.display = 'none';

        // Initialize OCR Worker
        const worker = await Tesseract.createWorker('kor+eng');
        
        // පේළි හඳුනා ගැනීම පහසු කිරීමට (Trained Data Optimization)
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ가-힣?,. ',
            tessedit_pageseg_mode: Tesseract.PSM.SINGLE_COLUMN // මෙන්න මේක වැදගත්
        });

        try {
            const result = await worker.recognize(file);
            const lines = result.data.lines;

            lines.forEach(line => {
                const text = line.text.trim();
                if (text.length < 2) return;

                // වඩාත් දියුණු regex එකක්
                // කොරියන් අකුරු, ඉන්පසු එන ඉංග්‍රීසි අකුරු සහ අවසානයේ ඇති ඉලක්කම් වෙන් කිරීම
                const parts = text.match(/^([가-힣\s\?]+)\s+([a-zA-Z\s\/\-\?]+)\s+(\d+)?$/);

                if (parts) {
                    createRow(parts[1].trim(), parts[2].trim(), parts[3] || '');
                } else {
                    // Regex එකට අහු වුණේ නැත්නම් සාමාන්‍ය විදියට field එකට දාමු
                    const kor = text.match(/[가-힣]+/g);
                    const eng = text.match(/[a-zA-Z\s]+/g);
                    if(kor) createRow(kor.join(' '), eng ? eng.join(' ').trim() : '', '');
                }
            });

            await worker.terminate();
            loading.style.display = 'none';
            document.getElementById('editArea').style.display = 'block';
        } catch (err) {
            console.error(err);
            loading.style.display = 'none';
        }
    });

    function createRow(kor, eng, page) {
        const div = document.createElement('div');
        div.className = 'word-row';
        div.innerHTML = `
            <div class="row g-2">
                <div class="col-6">
                    <label class="small text-muted">Korean</label>
                    <input type="text" class="form-control korean-val" value="${kor}">
                </div>
                <div class="col-6">
                    <label class="small text-muted">English</label>
                    <input type="text" class="form-control english-val" value="${eng}">
                </div>
                <div class="col-12 mt-2 d-flex justify-content-between align-items-center">
                    <span class="small text-secondary">Page: ${page}</span>
                    <button class="btn btn-add btn-sm px-4" onclick="sendRow(this, '${page}')">Submit Word</button>
                </div>
            </div>
        `;
        wordContainer.appendChild(div);
    }

    async function sendRow(btn, pageNo) {
        const row = btn.closest('.word-row');
        const korean = row.querySelector('.korean-val').value;
        const english = row.querySelector('.english-val').value;

        btn.disabled = true;
        btn.innerHTML = 'Sending...';

        const params = new URLSearchParams();
        params.append('korean', korean);
        params.append('english', english);
        params.append('page', pageNo);

        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors'});
            row.style.background = '#e7f3ff';
            btn.innerText = 'Added ✓';
            btn.classList.replace('btn-add', 'btn-secondary');
        } catch (err) {
            btn.disabled = false;
            btn.innerText = 'Retry';
        }
    }
</script>

</body>
</html>
