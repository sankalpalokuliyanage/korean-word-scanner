<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script>
        if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
    </script>
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; padding: 20px; }
        .app-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; border: 1px solid #e2e8f0; }
        .btn-save { background: #4f46e5; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.3s; }
        .history-item { background: white; border: 1px solid #e2e8f0; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h5 class="fw-bold m-0 text-primary">Hi, <span id="uName"></span></h5>
                <span class="small text-muted">Cloud Dataset Active</span>
            </div>
            <button class="btn btn-outline-danger btn-sm rounded-circle" onclick="logout()"><i class="bi bi-power"></i></button>
        </div>

        <div class="mb-4">
            <select id="level" class="form-select mb-3 rounded-3">
                <option>Level 1</option><option>Level 2</option><option>Level 3</option>
                <option>Level 4</option><option>Level 5</option><option>Level 6</option>
            </select>
            <input type="text" id="kor" class="form-control mb-3 fs-4 p-3 rounded-3 text-center" placeholder="Korean Word" autofocus>
            <input type="text" id="eng" class="form-control mb-4 p-3 rounded-3 text-center" placeholder="Meaning">
            <button id="addBtn" class="btn-save" onclick="save()">Save to Cloud</button>
        </div>

        <hr>
        <h6 class="fw-bold text-secondary mb-3">Recently Added</h6>
        <div id="localList"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwwoRpXRn0ATMkMwoZKHJyi5HGNgMhw519MwY6ZEomG6IHkvq8xCSNhsqOHdIg27Ku32w/exec';
    document.getElementById('uName').innerText = localStorage.getItem('fullName');

    async function save() {
        const kor = document.getElementById('kor').value.trim();
        const eng = document.getElementById('eng').value.trim();
        const level = document.getElementById('level').value;
        const user = localStorage.getItem('username');

        if(!kor || !eng) return;

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            const params = new URLSearchParams({ user, level, korean: kor, english: eng });
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });

            const list = document.getElementById('localList');
            list.innerHTML = `<div class="history-item"><div><b>${kor}</b><br><small class="text-muted">${eng}</small></div><span class="badge bg-light text-primary border">${level}</span></div>` + list.innerHTML;

            document.getElementById('kor').value = "";
            document.getElementById('eng').value = "";
            document.getElementById('kor').focus();
        } catch (e) {
            alert("Sync Error!");
        } finally {
            btn.disabled = false;
            btn.innerText = "Save to Cloud";
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Shortcuts
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            if(document.activeElement.id === 'kor') document.getElementById('eng').focus();
            else if(document.activeElement.id === 'eng') save();
        }
    });
</script>
</body>
</html>
