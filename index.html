<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Writing Lab - Offline OCR</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        /* ඔයා දීපු CSS ටික මෙතනට එනවා (මම UI එක ලස්සනට තියාගත්තා) */
        :root { --primary: #4f46e5; --success: #10b981; --bg: #f8fafc; --card: #ffffff; }
        body { background: var(--bg); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .eval-card { background: var(--card); width: 100%; max-width: 700px; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .upload-zone { border: 2px dashed #e2e8f0; border-radius: 16px; padding: 40px; cursor: pointer; }
        #imgPreview { width: 100%; border-radius: 12px; margin-top: 20px; display: none; }
        .hidden { display: none; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; text-align: left; }
        .data-card { background: #f1f5f9; padding: 15px; border-radius: 12px; }
        .hangul { font-size: 22px; font-weight: bold; color: var(--primary); }
        .circular-chart { max-width: 100px; margin: auto; }
        .circle { fill: none; stroke: var(--success); stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 0.5s; }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        #processBtn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;}
    </style>
</head>
<body>

<div class="eval-card">
    <div class="badge">FREE OCR POWERED</div>
    <h1>Korean Writing Lab</h1>
    <p>Analyze your handwriting using Tesseract Engine</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
        <input type="file" id="imageInput" accept="image/*" onchange="handleFile(this.files[0])" hidden />
        <div class="icon">📸</div>
        <p>Upload a clear photo of your Korean text</p>
    </div>

    <img id="imgPreview" src="" />
    <button id="processBtn" class="hidden" onclick="processOCR()">Analyze Handwriting</button>

    <div id="loader" class="hidden">
        <p class="pulsate">AI is decoding your Hangul... Please wait.</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="score-section">
            <svg viewBox="0 0 36 36" class="circular-chart">
                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <path id="scorePath" class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                <text x="18" y="20.35" class="percentage" id="scoreDisplay" style="font-size: 8px; text-anchor: middle;">0</text>
            </svg>
            <p>Accuracy Score</p>
        </div>

        <div class="analysis-grid">
            <div class="data-card">
                <label>Detected Text</label>
                <div id="textOriginal" class="hangul"></div>
            </div>
            <div class="data-card">
                <label>Target Text (Dataset)</label>
                <div id="textTarget" class="hangul">--</div>
            </div>
        </div>

        <div id="feedbackBox" style="margin-top:20px; padding:15px; border-radius:12px; background:#fffbeb; text-align:left;">
            <strong>Feedback:</strong>
            <p id="textFeedback"></p>
        </div>
        
        <button class="reset-btn" onclick="location.reload()" style="margin-top:20px;">Try Again</button>
    </div>
</div>

<script>
// මෙතන ඔයාට පුළුවන් නිවැරදි වචන ලැයිස්තුවක් දාන්න (Comparison එකට)
const TARGET_VOCAB = ["학교", "사과", "우유", "안녕하세요", "한국어"];

function handleFile(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('imgPreview').src = e.target.result;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('dropZone').style.display = 'none';
        document.getElementById('processBtn').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
}

async function processOCR() {
    const loader = document.getElementById('loader');
    const dashboard = document.getElementById('dashboard');
    const img = document.getElementById('imgPreview');
    
    loader.classList.remove('hidden');
    document.getElementById('processBtn').classList.add('hidden');

    try {
        // Tesseract භාවිතා කර අකුරු කියවීම
        const worker = await Tesseract.createWorker('kor');
        const { data: { text } } = await worker.recognize(img.src);
        const detected = text.trim();
        await worker.terminate();

        // සරල Analysis එකක් කරමු
        // මෙතනදී අපි බලනවා ඔයා scan කරපු වචනය අපේ Dataset එකේ තියෙනවද කියලා
        let score = 0;
        let feedback = "";
        let target = "Unknown";

        // Dataset එකේ තියෙන වචනයක් එක්ක සැසඳීම (Similarity check)
        const match = TARGET_VOCAB.find(v => detected.includes(v)) || "Unknown";
        
        if (match !== "Unknown") {
            score = 100;
            target = match;
            feedback = "විශිෂ්ටයි! ඔබ නිවැරදිව ලියා ඇත.";
        } else {
            score = detected.length > 0 ? 40 : 0;
            feedback = "අකුරු හඳුනාගැනීම අපහසුයි. නැවත පැහැදිලිව ලියන්න.";
        }

        // Dashboard එක update කිරීම
        document.getElementById('scoreDisplay').textContent = score;
        document.getElementById('scorePath').setAttribute('stroke-dasharray', `${score}, 100`);
        document.getElementById('textOriginal').innerText = detected || "No text found";
        document.getElementById('textTarget').innerText = match;
        document.getElementById('textFeedback').innerText = feedback;

        loader.classList.add('hidden');
        dashboard.classList.remove('hidden');

    } catch (err) {
        alert("OCR Error!");
        console.error(err);
    }
}
</script>
</body>
</html>
