<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }
        .app-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 950px; margin: auto; }
        .hidden { display: none; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #e2e8f0; margin-bottom: 15px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.3s; }
        .history-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 15px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .kor-txt { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
        .scroll-area { max-height: 450px; overflow-y: auto; padding-right: 10px; }
        .section-title { font-size: 0.85rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .badge-count { background: #e2e8f0; color: #1f2329; padding: 2px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-card">
        <div id="setupSection" style="max-width: 450px; margin: auto;">
            <h4 class="fw-bold mb-4 text-center">Session Setup</h4>
            <label class="small fw-bold text-secondary">CHOOSE LEVEL</label>
            <select id="levelSelect" class="form-select form-control">
                <option>Level 1</option><option>Level 2</option><option>Level 3</option>
                <option>Level 4</option><option>Level 5</option><option>Level 6</option>
            </select>
            <label class="small fw-bold text-secondary">YOUR NAME</label>
            <input type="text" id="userName" class="form-control" placeholder="Enter name...">
            <button class="btn-main" onclick="initSession()">Sync & Start</button>
        </div>

        <div id="workSection" class="hidden">
            <div class="d-flex justify-content-between mb-4">
                <div>
                    <h5 class="fw-bold m-0" id="displayUser"></h5>
                    <span class="badge bg-primary rounded-pill" id="displayLevel"></span>
                </div>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="location.reload()">Switch</button>
            </div>

            <div class="row mb-5 justify-content-center text-center">
                <div class="col-md-7">
                    <input type="text" id="korInput" class="form-control text-center fs-4" placeholder="Korean Word" autofocus>
                    <input type="text" id="engInput" class="form-control text-center" placeholder="English Meaning">
                    <button id="saveBtn" class="btn-main" onclick="saveData()">SAVE WORD</button>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 border-end">
                    <div class="section-title">Your History <span class="badge-count" id="myCount">0</span></div>
                    <div id="myHistoryList" class="scroll-area"></div>
                </div>

                <div class="col-md-6">
                    <div class="section-title">Global Level Bank <span class="badge-count" id="globalCount">0</span></div>
                    <div id="globalHistoryList" class="scroll-area"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxenP37pvmwucpQ2LFPk3QeTaqSr9FeZtPnBMkVn-7gXngAuip8cyxbN3zKObZ0v1i6_A/exec';
    let currentUser = "", currentLevel = "", allWords = [];

    async function initSession() {
        currentUser = document.getElementById('userName').value.trim();
        currentLevel = document.getElementById('levelSelect').value;
        if(!currentUser) return;

        document.getElementById('setupSection').classList.add('hidden');
        document.getElementById('workSection').classList.remove('hidden');
        document.getElementById('displayUser').innerText = currentUser;
        document.getElementById('displayLevel').innerText = currentLevel;

        fetchData();
    }

    async function fetchData() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getHistory&level=${currentLevel}`);
            allWords = await res.json();
            renderLists();
        } catch (e) {
            console.log("Fetch error");
        }
    }

    function renderLists() {
        const myHistoryList = document.getElementById('myHistoryList');
        const globalList = document.getElementById('globalHistoryList');


        const myWords = allWords.filter(item => item.user.toLowerCase() === currentUser.toLowerCase());

        document.getElementById('myCount').innerText = myWords.length;
        document.getElementById('globalCount').innerText = allWords.length;

        myHistoryList.innerHTML = myWords.length ? myWords.map(i => card(i)).join('') : '<p class="text-center text-muted small py-4">තවම වචන නැත</p>';
        globalList.innerHTML = allWords.length ? allWords.map(i => card(i, true)).join('') : '<p class="text-center text-muted small py-4">දත්ත නැත</p>';
    }

    function card(item, showUser = false) {
        return `
            <div class="history-card">
                <div>
                    <div class="kor-txt">${item.korean}</div>
                    <div class="small text-muted">${item.english} ${showUser ? `<span class="ms-1 opacity-50">| by ${item.user}</span>` : ''}</div>
                </div>
                <i class="bi bi-check-circle-fill text-success"></i>
            </div>
        `;
    }

    async function saveData() {
        const kor = document.getElementById('korInput').value.trim();
        const eng = document.getElementById('engInput').value.trim();
        if(!kor || !eng) return;

        // Global Check for Duplicates
        if(allWords.some(i => i.korean === kor)) {
            if(!confirm(`"${kor}" Already exists. Add again?`)) return;
        }

        const btn = document.getElementById('saveBtn');
        btn.disabled = true;

        try {
            const params = new URLSearchParams({ user: currentUser, level: currentLevel, korean: kor, english: eng });
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });

            // Local Update
            allWords.unshift({ user: currentUser, korean: kor, english: eng });
            renderLists();

            document.getElementById('korInput').value = "";
            document.getElementById('engInput').value = "";
            document.getElementById('korInput').focus();
        } catch (e) {
            alert("Error!");
        } finally {
            btn.disabled = false;
        }
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
            if(document.activeElement.id === 'korInput') document.getElementById('engInput').focus();
            else if(document.activeElement.id === 'engInput') saveData();
        }
    });
</script>
</body>
</html>
