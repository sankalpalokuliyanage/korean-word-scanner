<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lexicon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        if(localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'login.html';
    </script>
    <style>
        body { background: #f1f5f9; padding: 20px; font-family: sans-serif; }
        .glass-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        .history-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #4f46e5; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h5 class="fw-bold m-0">Hi, <span id="uName"></span></h5>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">Logout</button>
    </div>

    <div class="mb-3">
        <select id="level" class="form-select mb-2"><option>Level 1</option><option>Level 2</option><option>Level 3</option><option>Level 4</option><option>Level 5</option><option>Level 6</option></select>
        <input type="text" id="kor" class="form-control mb-2" placeholder="Korean Word" autofocus>
        <input type="text" id="eng" class="form-control mb-3" placeholder="Meaning">
        <button id="addBtn" class="btn btn-primary w-100 fw-bold" onclick="save()">SAVE TO CLOUD</button>
    </div>

    <hr>
    <h6 class="fw-bold mb-3">Recently Added</h6>
    <div id="localList"></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyC3tDhLBudRMzblPznq-ASkrxLBgnK5cQKkHS2j6nwBxCk5FaAxoAsrgi1sgedArKXTQ/exec';
    document.getElementById('uName').innerText = localStorage.getItem('fullName');

    async function save() {
        const kor = document.getElementById('kor').value;
        const eng = document.getElementById('eng').value;
        const level = document.getElementById('level').value;
        const user = localStorage.getItem('username');

        if(!kor || !eng) return;

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            const p = new URLSearchParams({ user, level, korean: kor, english: eng });
            await fetch(SCRIPT_URL, { method: 'POST', body: p, mode: 'no-cors' });

            const list = document.getElementById('localList');
            list.innerHTML = `<div class="history-item"><div><b>${kor}</b><br><small class="text-muted">${eng}</small></div><span class="badge bg-light text-primary border">${level}</span></div>` + list.innerHTML;

            document.getElementById('kor').value = '';
            document.getElementById('eng').value = '';
            document.getElementById('kor').focus();
        } catch (e) { alert("Error!"); }
        btn.disabled = false;
        btn.innerText = "SAVE TO CLOUD";
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }
</script>
</body>
</html>
