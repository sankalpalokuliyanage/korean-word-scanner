<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manual Precision Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .scanner-header { padding: 12px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 14px; }
        
        .viewport-container { position: relative; width: 100%; height: 40vh; background: #000; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .focus-box {
            position: absolute; width: 75%; height: 55px; border: 2px solid #00d2ff; border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none; transition: 0.3s;
        }
        
        /* Scanning Animation Line */
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #00d2ff;
            top: 0; left: 0; display: none;
            box-shadow: 0 0 10px #00d2ff;
            animation: scanMove 1.5s infinite linear;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        .control-panel { padding: 20px; background: #1a1a1a; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; height: 60vh; }
        
        .scan-group { background: #252525; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .scan-btn { background: #333; border: 1px solid #444; color: #fff; border-radius: 10px; padding: 8px 15px; font-size: 13px; transition: 0.2s; }
        .scan-btn:active { background: #444; transform: scale(0.95); }
        .scan-btn.scanning { background: #00d2ff; color: #000; border-color: #00d2ff; }

        .form-control-custom { background: transparent; border: none; color: #fff; font-weight: bold; font-size: 18px; padding: 0; margin-top: 5px; width: 100%; }
        .form-control-custom:focus { outline: none; box-shadow: none; }
        
        .btn-submit { background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; color: white; padding: 15px; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; }
        #status { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="scanner-header text-center fw-bold text-uppercase">Precision Manual Collector</div>

<div class="viewport-container">
    <video id="video" autoplay playsinline muted></video>
    <div class="focus-box" id="focusBox">
        <div class="scan-line" id="scanLine"></div>
    </div>
    <canvas id="captureCanvas"></canvas>
</div>

<div class="control-panel">
    <div class="scan-group d-flex align-items-center">
        <div class="flex-grow-1">
            <label class="small text-info fw-bold">Korean Word</label>
            <input type="text" id="korInput" class="form-control-custom" placeholder="---">
        </div>
        <button class="scan-btn" id="korScanBtn" onclick="performScan('kor')">SCAN</button>
    </div>

    <div class="scan-group d-flex align-items-center">
        <div class="flex-grow-1">
            <label class="small text-warning fw-bold">English Meaning</label>
            <input type="text" id="engInput" class="form-control-custom" placeholder="---">
        </div>
        <button class="scan-btn" id="engScanBtn" onclick="performScan('eng')">SCAN</button>
    </div>

    <button id="addBtn" class="btn btn-submit rounded-pill shadow" onclick="uploadData()">ADD TO DATASET</button>
    <button class="btn btn-link btn-sm w-100 text-secondary text-decoration-none mt-2" onclick="clearFields()">Clear & Reset</button>

    <div id="status">Initializing AI & Camera...</div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1I8cBQcJwrLqVgbfLvTqbDGciOle98avxX-j2G_XUMFLr48afMjhz0PSF9N2obMAhdg/exec';
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('captureCanvas');
    const scanLine = document.getElementById('scanLine');
    const status = document.getElementById('status');
    const focusBox = document.getElementById('focusBox');

    let worker = null;
    let isProcessing = false;

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;

            status.innerText = "Loading AI Models...";
            worker = await Tesseract.createWorker('kor+eng');
            await worker.setParameters({ tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE });
            
            status.innerText = "Ready to Scan";
        } catch (err) {
            status.innerText = "Error: " + err.message;
        }
    }

    async function performScan(mode) {
        if (isProcessing || !worker) return;
        
        const btn = document.getElementById(mode + 'ScanBtn');
        const input = document.getElementById(mode + 'Input');
        
        isProcessing = true;
        btn.classList.add('scanning');
        btn.innerText = "WAIT";
        scanLine.style.display = "block";
        focusBox.style.borderColor = (mode === 'kor') ? "#00d2ff" : "#ffc107";

        // Capture Frame
        const ctx = canvas.getContext('2d');
        const box = focusBox.getBoundingClientRect();
        const videoBox = video.getBoundingClientRect();

        const scaleX = video.videoWidth / videoBox.width;
        const scaleY = video.videoHeight / videoBox.height;

        const sx = (box.left - videoBox.left) * scaleX;
        const sy = (box.top - videoBox.top) * scaleY;
        const sw = box.width * scaleX;
        const sh = box.height * scaleY;

        canvas.width = sw;
        canvas.height = sh;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

        try {
            const { data: { text } } = await worker.recognize(canvas);
            const cleaned = text.trim().replace(/\n/g, "");
            
            if (cleaned.length > 0) {
                input.value = cleaned;
                status.innerText = mode.toUpperCase() + " captured successfully";
            } else {
                status.innerText = "No text detected. Try again.";
            }
        } catch (e) {
            status.innerText = "Scan failed.";
        } finally {
            isProcessing = false;
            btn.classList.remove('scanning');
            btn.innerText = "SCAN";
            scanLine.style.display = "none";
        }
    }

    async function uploadData() {
        const kor = document.getElementById('korInput').value;
        const eng = document.getElementById('engInput').value;

        if (!kor || !eng) {
            alert("වචනය සහ තේරුම දෙකම තිබිය යුතුය.");
            return;
        }

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "UPLOADING...";

        try {
            const params = new URLSearchParams({ korean: kor, english: eng, page: 'Manual-Precision' });
            await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
            status.innerText = "Saved Successfully! ✓";
            setTimeout(clearFields, 1000);
        } catch (e) {
            alert("Upload Failed!");
        } finally {
            btn.disabled = false;
            btn.innerText = "ADD TO DATASET";
        }
    }

    function clearFields() {
        document.getElementById('korInput').value = '';
        document.getElementById('engInput').value = '';
        status.innerText = "Ready to Scan";
        focusBox.style.borderColor = "#00d2ff";
    }

    init();
</script>
</body>
</html>
