<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        .btn-primary { background: #4f46e5; border: none; padding: 14px; border-radius: 12px; font-weight: bold; width: 100%; }
        .hidden { display: none; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader" class="loader hidden"><div class="spinner-border text-primary"></div></div>

<div class="auth-card">
    <div class="text-center mb-4">
        <h3 id="t" class="fw-bold">Login</h3>
        <p class="text-muted small">Lexicon Cloud System</p>
    </div>

    <div id="regOnly" class="hidden">
        <label class="small fw-bold">Full Name</label>
        <input type="text" id="regName" class="form-control mb-3" placeholder="Sankalpa">
    </div>

    <label class="small fw-bold">Username</label>
    <input type="text" id="username" class="form-control mb-3" placeholder="username">

    <label class="small fw-bold">Password</label>
    <input type="password" id="password" class="form-control mb-4" placeholder="••••••••">

    <button class="btn btn-primary mb-3" id="mainBtn" onclick="auth()">Login Now</button>
    <button class="btn btn-link w-100 text-decoration-none small text-secondary" onclick="toggle()">New user? Register</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyC3tDhLBudRMzblPznq-ASkrxLBgnK5cQKkHS2j6nwBxCk5FaAxoAsrgi1sgedArKXTQ/exec';
    let isLogin = true;

    if(localStorage.getItem('isLoggedIn') === 'true') window.location.href = 'index.html';

    function toggle() {
        isLogin = !isLogin;
        document.getElementById('t').innerText = isLogin ? "Login" : "Register";
        document.getElementById('regOnly').classList.toggle('hidden', isLogin);
        document.getElementById('mainBtn').innerText = isLogin ? "Login Now" : "Register Now";
    }

    function auth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const n = document.getElementById('regName').value;
        if(!u || !p) return alert("කරුණාකර සියල්ල පුරවන්න");

        document.getElementById('loader').classList.remove('hidden');

        const action = isLogin ? 'login' : 'register';
        const finalUrl = `${SCRIPT_URL}?action=${action}&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&name=${encodeURIComponent(n)}&callback=handleRes`;

        const script = document.createElement('script');
        script.src = finalUrl;
        document.body.appendChild(script);
    }

    function handleRes(res) {
        document.getElementById('loader').classList.add('hidden');
        if(res.status === 'success') {
            if(isLogin) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', document.getElementById('username').value);
                localStorage.setItem('fullName', res.name);
                window.location.href = 'index.html';
            } else {
                alert("ලියාපදිංචිය සාර්ථකයි! දැන් Login වන්න.");
                toggle();
            }
        } else {
            alert(res.message);
        }
    }
</script>
</body>
</html>
