<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lexicon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .hidden { display: none; }
        .spinner-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

<div id="loader" class="spinner-container hidden"><div class="spinner-border text-primary"></div></div>

<div class="auth-card" id="card">
    <div class="text-center mb-4">
        <h3 id="t" class="fw-bold">Login</h3>
        <p class="text-muted small">Lexicon Cloud System</p>
    </div>

    <div id="regDiv" class="hidden">
        <label class="small fw-bold">Full Name</label>
        <input type="text" id="name" class="form-control mb-3">
    </div>

    <label class="small fw-bold">Username</label>
    <input type="text" id="user" class="form-control mb-3">

    <label class="small fw-bold">Password</label>
    <input type="password" id="pass" class="form-control mb-4">

    <button class="btn btn-primary w-100 mb-3 fw-bold" id="btn" onclick="auth()">Login Now</button>
    <button class="btn btn-link w-100 text-decoration-none small text-muted" onclick="toggle()" id="sw">New? Register</button>
</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbwACkzBASSiRm6cWAytncGQD5d9aYKJQPd8oLr2jxEjkqMLI9fiblFXzsJlyCebD-4TuA/exec';
    let isLogin = true;

    function toggle() {
        isLogin = !isLogin;
        document.getElementById('t').innerText = isLogin ? "Login" : "Register";
        document.getElementById('regDiv').classList.toggle('hidden', isLogin);
        document.getElementById('btn').innerText = isLogin ? "Login Now" : "Register Now";
        document.getElementById('sw').innerText = isLogin ? "New? Register" : "Have an account? Login";
    }

    async function auth() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const n = document.getElementById('name').value;
        
        if(!u || !p) return alert("Please fill all");

        document.getElementById('loader').classList.remove('hidden');
        document.getElementById('card').style.opacity = '0.5';

        const action = isLogin ? 'login' : 'register';
        // සම්පූර්ණ URL එක හදාගන්නවා
        const finalUrl = `${URL}?action=${action}&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}&name=${encodeURIComponent(n)}`;

        try {
            const res = await fetch(finalUrl);
            const data = await res.json();

            if(data.status === 'success') {
                if(isLogin) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', u);
                    localStorage.setItem('fullName', data.name);
                    localStorage.setItem('cloudHistory', JSON.stringify(data.data));
                    window.location.href = 'index.html';
                } else {
                    alert("Success! Please Login.");
                    toggle();
                }
            } else {
                alert(data.message || "Failed");
            }
        } catch (e) {
            alert("Error: Script permissions check කරන්න.");
        } finally {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('card').style.opacity = '1';
        }
    }
</script>
</body>
</html>
